<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skin Disease Detection And Classification Using Cnn Model</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #007bff, #6610f2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    .card-box {
        background: #ffffff;
        color: #333;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
        width: 80%;
        max-width: 900px;
        text-align: center;
    }

    .btn-custom {
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .btn-custom:hover {
        transform: translateY(-3px);
    }

    .counter-box {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        font-size: 24px;
        font-weight: bold;
        color: #333;
        transition: 0.3s ease;
    }

    .counter-box:hover {
        transform: scale(1.05);
    }

    .feature-box {
        margin-top: 30px;
    }

    .feature-item {
        background: rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 8px;
        margin: 10px;
        backdrop-filter: blur(5px);
    }
</style>

</head>
<body>

<div class="card-box">
    <h1 class="mb-3">Skin Disease Detection System</h1>
    <p class="lead">AI-powered system for early detection of skin diseases using deep learning.</p>

    <!-- Buttons -->
    <div class="mt-4">
        <a href="/admin_login" class="btn btn-primary btn-custom me-2">Admin Login</a>
        <a href="/login" class="btn btn-outline-primary btn-custom me-2">User Login</a>
        <a href="/register" class="btn btn-dark btn-custom">Register</a>
    </div>

    <!-- Dynamic Counters -->
    <div class="row mt-5">
        <div class="col-md-6">
            <div class="counter-box">
                <span id="userCount">{{ total_users }}</span> <br> Registered Users
            </div>
        </div>
        <div class="col-md-6">
            <div class="counter-box">
                <span id="predictCount">{{ total_predictions }}</span> <br> Total Predictions
            </div>
        </div>
    </div>

    <!-- Features -->
    <div class="feature-box row text-center">
        <div class="col-md-4 feature-item">
            🔍 High Accuracy Predictions
        </div>
        <div class="col-md-4 feature-item">
            ⚡ Fast Model Processing
        </div>
        <div class="col-md-4 feature-item">
            🧠 Deep Learning Algorithms
        </div>
    </div>
</div>

<!-- Counter Animation -->
<script>
    function animateCounter(id, end) {
        let start = 0;
        let duration = 700;
        let increment = end / (duration / 10);

        let counter = setInterval(function () {
            start += increment;
            if (start >= end) {
                start = end;
                clearInterval(counter);
            }
            document.getElementById(id).innerText = Math.floor(start);
        }, 10);
    }

    animateCounter("userCount", {{ total_users }});
    animateCounter("predictCount", {{ total_predictions }});
</script>

</body>
</html>
