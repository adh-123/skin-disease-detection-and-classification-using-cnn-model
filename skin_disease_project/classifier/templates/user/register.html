<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration | Skin Disease Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #1cc88a, #4e73df);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        color: white;
        padding-top: 60px;
    }

    /* NAVBAR */
    .glass-nav {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 12px 25px;
        box-shadow: 0px 4px 18px rgba(0,0,0,0.1);
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 1100px;
        z-index: 1000;
    }

    .glass-nav a {
        color: white !important;
        font-weight: 500;
        transition: 0.2s ease;
    }

    .glass-nav a:hover {
        opacity: 0.7;
    }

    .register-card {
        background: rgba(255, 255, 255, 0.2);
        width: 420px;
        padding: 35px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0px 4px 18px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
        color: white;
    }

    .register-card h3 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 15px;
        border: none;
    }

    .form-control:focus {
        box-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    .btn-register {
        border-radius: 10px;
        padding: 12px;
        font-weight: bold;
        background-color: #2e59d9;
        border: none;
        color: white;
        transition: 0.3s ease;
    }

    .btn-register:hover {
        background-color: #1e3fa1;
        transform: translateY(-3px);
    }

    .alert {
        animation: slideIn 0.4s ease-in-out;
        border-radius: 8px;
    }

    a {
        color: #fff;
        font-weight: 600;
        text-decoration: underline;
    }

    a:hover {
        opacity: 0.7;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>

</head>
<body>

<!-- 🌟 NAVBAR -->
<nav class="glass-nav navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Skin Disease Detection And Classification Using Cnn Model</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="/login" class="nav-link">User Login</a></li>
                <li class="nav-item"><a href="/admin_login" class="nav-link">Admin Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🌟 REGISTER CARD -->
<div class="register-card">
    <h3>User Registration</h3>

    {% if message %}
        <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input name="username" class="form-control" placeholder="Enter Username" required>

        <input name="email" type="email" class="form-control" placeholder="Enter Email" required>

        <input name="password" type="password" class="form-control" placeholder="Create Password" required>

        <button class="btn btn-register w-100 mt-2">Register</button>
    </form>

    <p class="mt-3 text-center">
        Already have an account?  
        <a href="/login">Login</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
