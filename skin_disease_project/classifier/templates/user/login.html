<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login | Skin Disease Detection And Classification Using Cnn Model</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #4e73df, #36b9cc);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        padding-top: 70px;
        color: white;
    }

    /* NAVBAR */
    .glass-nav {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 12px 25px;
        box-shadow: 0px 4px 18px rgba(0,0,0,0.1);
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 1100px;
        z-index: 1000;
    }

    .glass-nav a {
        color: white !important;
        font-weight: 500;
        transition: 0.2s;
    }

    .glass-nav a:hover {
        opacity: 0.7;
    }

    /* LOGIN CARD */
    .login-card {
        background: rgba(255, 255, 255, 0.25);
        padding: 35px;
        border-radius: 15px;
        width: 420px;
        backdrop-filter: blur(12px);
        box-shadow: 0px 4px 18px rgba(0,0,0,0.25);
        animation: fadeIn 0.6s ease-in-out;
        color: white;
    }

    .login-card h3 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        border: none;
        margin-bottom: 15px;
    }

    .form-control:focus {
        box-shadow: 0 0 8px rgba(255,255,255,0.9);
    }

    .btn-login {
        background-color: #1f4bd8;
        border: none;
        border-radius: 10px;
        padding: 12px;
        width: 100%;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .btn-login:hover {
        background-color: #1736a6;
        transform: translateY(-2px);
    }

    a {
        color: #fff;
        font-weight: 600;
        text-decoration: underline;
    }

    a:hover {
        opacity: 0.7;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>
<body>

<!-- 🌟 NAVBAR -->
<nav class="glass-nav navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Skin Disease Detection And Classification Using Cnn Model</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="/register" class="nav-link">Register</a></li>
                <li class="nav-item"><a href="/admin_login" class="nav-link">Admin Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🌟 LOGIN CARD -->
<div class="login-card">
    <h3>User Login</h3>

    {% if message %}
        <div class="alert alert-danger">{{ message }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input name="username" class="form-control" placeholder="Enter Username" required>

        <input name="password" type="password" class="form-control" placeholder="Enter Password" required>

        <button class="btn btn-login mt-2">Login</button>
    </form>

    <p class="mt-3 text-center">
        No account?  
        <a href="/register">Register</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
