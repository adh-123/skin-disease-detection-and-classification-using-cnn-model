<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | Skin Disease Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        padding-top: 80px; /* Space for navbar */
    }

    /* NAVBAR */
    .glass-nav {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 12px 25px;
        box-shadow: 0px 4px 18px rgba(0,0,0,0.1);
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 1100px;
        z-index: 1000;
    }

    .glass-nav a {
        color: white !important;
        font-weight: 500;
        transition: 0.2s ease;
    }

    .glass-nav a:hover {
        opacity: 0.7;
    }

    /* LOGIN CARD */
    .login-card {
        background: rgba(255, 255, 255, 0.2);
        padding: 35px;
        border-radius: 15px;
        width: 400px;
        backdrop-filter: blur(10px);
        box-shadow: 0px 4px 18px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
        color: white;
    }

    .login-card h3 {
        font-weight: bold;
        margin-bottom: 20px;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 15px;
    }

    .btn-login {
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        background-color: #2e59d9;
        border: none;
        color: white;
        transition: 0.3s ease;
    }

    .btn-login:hover {
        background-color: #1e3fa1;
        transform: translateY(-2px);
    }

    .alert {
        animation: slideIn 0.4s ease-in-out;
        border-radius: 8px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>
<body>

<!-- 🌟 NAVBAR -->
<nav class="glass-nav navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            Skin Disease Detection And Classification using Cnn Model
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="/login" class="nav-link">User Login</a></li>
                <li class="nav-item"><a href="/register" class="nav-link">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🌟 LOGIN CARD -->
<div class="login-card text-center">
    <h3>Admin Login</h3>

    {% if msg %}
        <div class="alert alert-danger">{{ msg }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input name="username" class="form-control" placeholder="Enter Username" required>

        <input name="password" type="password" class="form-control" placeholder="Enter Password" required>

        <button class="btn btn-login w-100 mt-2">Login</button>
    </form>

    <hr style="background:white">

    <p style="font-size:14px; opacity:0.8;">© {{ now|date:"Y" }} Skin Disease Detection System</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
